<!doctype html>
<!-- @dsCard group="UI Kit — Tenet" name="UI Kit — Tenet" subtitle="Interpretive recreation — sidebar, shot list, detail panel" viewport="1440x820" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tenet — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--paper); color: var(--ink); font-family: var(--font-sans); }
  #root { display: flex; height: 100vh; }
  .main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; }
  .body-row { display: flex; flex: 1; min-height: 0; }
  /* light webkit scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 999px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="StatusChip.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="ShotList.jsx"></script>
<script type="text/babel" src="ShotDetail.jsx"></script>

<script type="text/babel">
  const App = () => {
    const [section, setSection] = React.useState("shots");
    const [activeShotId, setActiveShotId] = React.useState("001A");
    const shot = (window.__tenetShots || []).find(s => s.id === activeShotId);
    return (
      <>
        <Sidebar active={section} onChange={setSection} />
        <div className="main-col">
          <TopBar section={section.charAt(0).toUpperCase() + section.slice(1)} />
          <div className="body-row">
            <ShotList activeId={activeShotId} onSelect={setActiveShotId} />
            <ShotDetail shot={shot} />
          </div>
        </div>
      </>
    );
  };
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
