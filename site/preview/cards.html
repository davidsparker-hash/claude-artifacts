<!doctype html>
<!-- @dsCard group="Components" name="Components — Cards" subtitle="Paper-soft fill, hairline, flat — no resting shadow" viewport="700x230" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--paper); display: flex; gap: 16px; align-items: stretch; }
  .card { flex: 1; background: var(--paper-soft); border: 1px solid var(--border); border-radius: 4px; padding: 18px 18px 16px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.04em; }
  .title { font-family: var(--font-display); font-size: 18px; font-weight: 400; color: var(--ink); line-height: 1.25; }
  .sub { font-size: 12px; color: var(--ink-muted); line-height: 1.4; }
  .foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between; }
  .chip { font-size: 10px; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 999px; color: var(--amber-800); background: var(--amber-50); }
  .chip.lock { color: #fff; background: var(--ink); }
  .name { font-size: 11px; color: var(--ink-muted); }
  .accent-bar { position: absolute; top: 18px; left: 30px; width: 24px; height: 2px; background: var(--anona-orange); }
  .label { position: absolute; top: 26px; left: 60px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  body { padding-top: 56px; position: relative; }
</style></head>
<body>
  <div class="accent-bar"></div><span class="label">Cards</span>
  <div class="card">
    <span class="meta">SCENE 04 · TAKE 03</span>
    <div class="title">Rooftop chase, golden hour</div>
    <div class="sub">A-cam OK, B-cam flagged for focus. Sound clean.</div>
    <div class="foot"><span class="chip">In Review</span><span class="name">A. Vega</span></div>
  </div>
  <div class="card">
    <span class="meta">SCENE 07 · TAKE 01</span>
    <div class="title">Diner interior, dialogue</div>
    <div class="sub">All departments signed off. Held for picture lock.</div>
    <div class="foot"><span class="chip lock">Locked</span><span class="name">D. Parker</span></div>
  </div>
</body></html>
