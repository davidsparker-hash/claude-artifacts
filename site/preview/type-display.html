<!doctype html>
<!-- @dsCard group="Type" name="Type — Display" subtitle="Jost Light 300 — the editorial headline voice" viewport="700x220" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .display { font-family: var(--font-display); font-weight: 300; font-size: 96px; line-height: 1; letter-spacing: -0.015em; color: var(--ink); margin: 18px 0 4px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
  .amber { color: var(--anona-orange); }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Display · Brown Light 300</span>
  <div class="display">A pipeline shaped <span class="amber">like the work.</span></div>
  <div class="meta">96 / 1.0 · tracking −0.015em · weight 300</div>
</body></html>
