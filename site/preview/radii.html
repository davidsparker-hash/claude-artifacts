<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing — Radii" subtitle="Square by default; pill reserved for chips" viewport="700x200" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .row { display: flex; gap: 24px; margin-top: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { width: 60px; height: 44px; background: var(--paper-soft); border: 1px solid var(--border); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--ink); }
  .v { font-family: var(--font-mono); font-size: 9px; color: var(--ink-muted); }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Corner Radii — Square by default</span>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="tok">r-0</div><div class="v">0px</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="tok">r-1</div><div class="v">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="tok">r-2</div><div class="v">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="tok">r-3</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="tok">r-pill</div><div class="v">999px</div></div>
  </div>
</body></html>
