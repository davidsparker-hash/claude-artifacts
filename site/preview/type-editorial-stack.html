<!doctype html>
<!-- @dsCard group="Type" name="Type — Editorial Stack" subtitle="Kicker → headline → lede (the canonical block)" viewport="700x240" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .kicker { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--anona-orange); font-weight: 400; }
  .headline { font-family: var(--font-display); font-weight: 300; font-size: 44px; line-height: 1.05; letter-spacing: -0.01em; color: var(--ink); margin: 10px 0 8px; }
  .lede { font-size: 14px; line-height: 1.6; color: var(--ink-muted); max-width: 540px; }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Kicker → Headline → Lede</span>
  <div style="margin-top: 18px;">
    <div class="kicker">Production</div>
    <div class="headline">A pipeline shaped like the work.</div>
    <div class="lede">Tenet is the production pipeline real teams use to get from script to final cut — built around how creative work actually happens.</div>
  </div>
</body></html>
