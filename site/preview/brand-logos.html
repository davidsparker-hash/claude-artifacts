<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px 8px; border: 1px solid var(--border); border-radius: 2px; background: var(--paper); }
  .cell img { height: 56px; width: auto; object-fit: contain; }
  .nm { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.04em; }
  .nm em { font-style: normal; color: var(--ink); font-weight: 700; }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Brand Marks</span>
  <div class="grid">
    <div class="cell"><img src="../assets/logos/anona-logo.jpg" alt="ANONA"><div class="nm"><em>ANONA</em> · parent</div></div>
    <div class="cell"><img src="../assets/logos/tenet-logo.jpg" alt="TENET"><div class="nm"><em>TENET</em> · product</div></div>
    <div class="cell"><img src="../assets/logos/jane-logo.jpg" alt="JANE"><div class="nm"><em>JANE</em> · studio</div></div>
  </div>
</body></html>
