<!doctype html>
<!-- @dsCard group="Components" name="Components — Buttons" subtitle="Primary, amber, ghost, link, disabled" viewport="700x180" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .row { display: flex; gap: 12px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-sans); font-size: 13px; font-weight: 400; letter-spacing: 0.01em; padding: 10px 18px; border-radius: 2px; border: 1px solid transparent; cursor: pointer; transition: background .15s ease-out, color .15s ease-out; }
  .btn--primary { background: var(--ink); color: #fff; }
  .btn--primary:hover { background: #000; }
  .btn--amber { background: var(--anona-orange); color: #fff; }
  .btn--amber:hover { background: var(--amber-800); }
  .btn--ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn--ghost:hover { background: var(--ink); color: #fff; }
  .btn--link { background: transparent; color: var(--anona-orange); padding: 10px 0; border-bottom: 1px solid var(--anona-orange); border-radius: 0; }
  .btn--disabled { background: var(--paper-soft); color: var(--ink-faint); cursor: not-allowed; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); margin-top: 14px; }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Buttons</span>
  <div class="row">
    <button class="btn btn--primary">Lock the cut</button>
    <button class="btn btn--amber">Send to color</button>
    <button class="btn btn--ghost">Cancel</button>
    <button class="btn btn--link">View dailies →</button>
    <button class="btn btn--disabled">Disabled</button>
  </div>
  <div class="meta">Square corners · 2 px radius · 500 weight · no scale on hover</div>
</body></html>
