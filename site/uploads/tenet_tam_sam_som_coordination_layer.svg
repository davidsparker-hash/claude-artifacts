<svg width="100%" viewBox="0 0 680 470" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">TAM SAM SOM for TENET sized on the coordination layer</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Three nested funnel bands. TAM is global content production and coordination spend at about 255 billion dollars. SAM is production-management and coordination software for media and entertainment at about 4.9 billion dollars by 2030. SOM is TENET&#39;s near-term beachhead at roughly 5.4 million dollars ARR, the base-case exit figure. Each band carries its definition and source basis.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></marker>
</defs>


<g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<path d="M40 40 L640 40 L560 150 L120 150 Z" stroke-width="0.5" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"></path>
</g>
<text x="340" y="70" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">TAM \u00b7 ~$255B</text>
<text x="340" y="90" text-anchor="middle" dominant-baseline="central" fill="#444441" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Global content production &amp; coordination spend</text>
<text x="340" y="124" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">The money that flows through production every year \u2014 the pool TENET sits on</text>


<g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<path d="M120 158 L560 158 L470 268 L210 268 Z" stroke-width="0.5" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"></path>
</g>
<text x="340" y="186" text-anchor="middle" dominant-baseline="central" fill="#04342C" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">SAM \u00b7 ~$4.9B by 2030</text>
<text x="340" y="206" text-anchor="middle" dominant-baseline="central" fill="#085041" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Production-mgmt &amp; coordination software (M&amp;E)</text>
<text x="340" y="240" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Budgeting/cost-tracking + collaboration tools \u2014 the layer, not the generators</text>


<g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<path d="M210 276 L470 276 L410 386 L270 386 Z" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"></path>
</g>
<text x="340" y="306" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">SOM \u00b7 ~$5.4M ARR</text>
<text x="340" y="326" text-anchor="middle" dominant-baseline="central" fill="#712B13" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">Base-case 18-mo beachhead</text>
<text x="340" y="360" text-anchor="middle" dominant-baseline="central" fill="#993C1D" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">JANE anchor + early enterprise \u2014 ~0.1% of SAM</text>


<text x="340" y="418" text-anchor="middle" fill="var(--t)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">TENET needs ~one-tenth of one percent of the software layer to hit base case</text>
<text x="340" y="440" text-anchor="middle" fill="var(--t)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">The bet is owning the coordination layer, not the $255B pool beneath it</text>

</svg>