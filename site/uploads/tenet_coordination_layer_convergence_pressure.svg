<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, &#34;system-ui&#34;, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">TENET&#39;s target zone sits at the center. Four arrows press inward from four surrounding groups: work-OS and automation platforms from the top, studio pipeline trackers from the left, production-finance platforms from the bottom, and the enterprise gen-AI suite from the right. A note marks the two capabilities none of them yet hold.</desc>
