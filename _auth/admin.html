<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- AUTH/ADMIN page (not design). Lives in /_auth/ — never overwritten by Claude Design.
     Visit at:  https://anona.tv/_auth/admin.html  -->
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Anona — Admin · Login log</title>
<style>
  :root {
    --paper:#f6f4ef; --ink:#1a1a1a; --muted:#6b6b6b; --rule:rgba(0,0,0,0.10);
    --accent:#BA7517;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    padding:48px 28px 80px;
  }
  .wrap { max-width:920px; margin:0 auto; }
  header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  h1 { font-weight:300; font-size:30px; letter-spacing:-0.01em; margin:0; }
  .kicker { font-family:ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:0.22em;
            text-transform:uppercase; color:var(--accent); margin-bottom:28px; }
  #signout { background:none; border:0; border-bottom:1px solid var(--rule); cursor:pointer;
             font-size:13px; color:var(--muted); padding:2px 0; }
  #signout:hover { color:var(--accent); border-color:var(--accent); }
  #status { color:var(--muted); font-size:15px; margin:24px 0; }
  h2 { font-weight:400; font-size:13px; letter-spacing:0.08em; text-transform:uppercase;
       color:var(--muted); margin:40px 0 12px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; font-weight:500; color:var(--muted); font-size:11px;
       letter-spacing:0.08em; text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--rule); }
  td { padding:9px 12px; border-bottom:1px solid var(--rule); }
  tr:hover td { background:rgba(0,0,0,0.02); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">Anona · Admin</div>
    <header>
      <h1>Login log</h1>
      <button id="signout" type="button">Sign out</button>
    </header>

    <p id="status">Loading…</p>

    <h2>Per user</h2>
    <table><tbody id="summary"></tbody></table>

    <h2>Recent activity</h2>
    <table><tbody id="recent"></tbody></table>
  </div>

  <script src="/_auth/config.js"></script>
  <script type="module" src="/_auth/admin.js"></script>
</body>
</html>
