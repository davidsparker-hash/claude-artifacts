<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper-soft); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .quote { border-left: 2px solid var(--anona-orange); padding: 4px 0 4px 22px; font-family: var(--font-serif); font-weight: 300; font-style: italic; font-size: 26px; line-height: 1.35; color: var(--ink); margin: 16px 0 10px; max-width: 580px; }
  .byline { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.02em; margin-left: 24px; }
  .byline em { font-style: normal; color: var(--ink); font-weight: 700; }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Pull Quote — Source Serif 4 Italic</span>
  <div class="quote">The colorist's opinion is the point. The tool just needs to get out of the way.</div>
  <div class="byline"><em>David Parker</em> · Founder</div>
</body></html>
