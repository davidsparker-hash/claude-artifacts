<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--paper); }
  .accent-bar { width: 32px; height: 2px; background: var(--anona-orange); margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 400; }
  .row { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
  .item { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .blk { background: var(--ink); height: 22px; }
  .tok { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-muted); }
  .px { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink); }
</style></head>
<body>
  <div class="accent-bar"></div>
  <span class="label">Spacing — 4 pt grid</span>
  <div class="row">
    <div class="item"><div class="blk" style="width:4px"></div><div class="tok">s-1</div><div class="px">4</div></div>
    <div class="item"><div class="blk" style="width:8px"></div><div class="tok">s-2</div><div class="px">8</div></div>
    <div class="item"><div class="blk" style="width:12px"></div><div class="tok">s-3</div><div class="px">12</div></div>
    <div class="item"><div class="blk" style="width:16px"></div><div class="tok">s-4</div><div class="px">16</div></div>
    <div class="item"><div class="blk" style="width:24px"></div><div class="tok">s-5</div><div class="px">24</div></div>
    <div class="item"><div class="blk" style="width:32px"></div><div class="tok">s-6</div><div class="px">32</div></div>
    <div class="item"><div class="blk" style="width:48px"></div><div class="tok">s-7</div><div class="px">48</div></div>
    <div class="item"><div class="blk" style="width:64px"></div><div class="tok">s-8</div><div class="px">64</div></div>
    <div class="item"><div class="blk" style="width:96px"></div><div class="tok">s-9</div><div class="px">96</div></div>
  </div>
</body></html>
